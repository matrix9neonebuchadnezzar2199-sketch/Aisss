name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aisss
          POSTGRES_PASSWORD: aisss
          POSTGRES_DB: aisss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aisss -d aisss_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install -w @aisss/api
      - run: npm run lint -w @aisss/api
      - run: npm test -w @aisss/api
        env:
          INTEGRATION_DATABASE_URL: postgresql://aisss:aisss@localhost:5432/aisss_test
      - run: npm run build -w @aisss/api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install -w @aisss/web
      - run: npm run lint -w @aisss/web
      - run: npm test -w @aisss/web
      - run: npm run build -w @aisss/web

  workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install -w @aisss/workers
      - run: npm test -w @aisss/workers
